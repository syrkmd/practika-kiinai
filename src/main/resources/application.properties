spring.application.name=vorstu

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate

jwt.secret=${JWT_SECRET}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}


spring.mail.host=smtp.yandex.ru
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true


app.mail.from=${MAIL_USERNAME}
app.registration.base-url=http://localhost:8080

app.outbox.max-attempts=5
app.outbox.retry-base-delay-seconds=60
app.outbox.poll-interval-ms=3000

app.delivery.strategy=worker

app.kafka.registration-invitation-topic=registration-invitation-emails
app.kafka.registration-invitation-consumer-group=registration-invitation-consumer

app.kafka.send-timeout-seconds=5

app.kafka.consumer.max-attempts=5
app.kafka.consumer.retry-initial-interval-ms=1000
app.kafka.consumer.retry-multiplier=2.0
app.kafka.consumer.retry-max-interval-ms=10000
app.kafka.consumer.failure-probability=0.0

app.kafka.dlt-topic=registration-invitation-emails-dlt

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}